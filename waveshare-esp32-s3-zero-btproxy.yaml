substitutions:
  name: "esp32-s3-zero-btproxy"
  friendly_name: "Bluetooth Proxy"
  room: ""
  device_description: "Waveshare ESP32-S3-Zero configured as Bluetooth proxy"
  project_name: "dlitz.waveshare-esp32-s3-zero-btproxy"
  project_version: "v0.0.1"
  sensor_update_interval: "10s"
  wifi_fast_connect: "false"
  ipv6_enable: "true"
  ibeacon_minor_id: 0
  ota_update_password: "false"
  ota_new_password: ""

# Board: Waveshare ESP32-S3-Zero
# Chip: ESP32-S3FH4R2
# CPU speed: 240MHz
# Flash: 4MB
# PSRAM: 2MB, Quad, 80MHz
esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"
  area: "${room}"
  name_add_mac_suffix: true
  project:
    name: "${project_name}"
    version: "${project_version}"
  on_boot:
    - lambda: |-
        #ifdef USE_OTA_PASSWORD
        const bool ota_update_password = (${ota_update_password});
        const std::string ota_new_password = "${ota_new_password}";
        if (ota_update_password) {
          ESP_LOGI("ota_update_password", "Setting new OTA password");
          id(ota_id).set_auth_password(ota_new_password);
        } else {
          ESP_LOGI("ota_update_password", "No new OTA password");
        }
        #else
          ESP_LOGI("ota_update_password", "No OTA password: USE_OTA_PASSWORD not defined");
        #endif


esp32:
  variant: esp32s3
  flash_size: 4MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_2: "n"  # No need for TLS1.2 support?
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.4.2
      CONFIG_MBEDTLS_DEFAULT_CERTIFICATE_BUNDLE: CONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN

psram:
  mode: quad
  speed: 80MHz

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API with dynamic key
api:
  encryption:

ota:
  platform: esphome
  id: ota_id

wifi:
  fast_connect: "${wifi_fast_connect}"
  enable_btm: true
  enable_rrm: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:

captive_portal:

network:
  enable_ipv6: "${ipv6_enable}"
  #min_ipv6_addr_count: 2

dashboard_import:
  #package_import_url: https://gitea.dlitz.net/dlitz/esphome-configs-dlitz/waveshare-esp32-s3-zero-btproxy.yaml
  #package_import_url: https://gitea.dlitz.net/dlitz/esphome-configs-dlitz/raw/branch/wip/waveshare-esp32-s3-zero-btproxy.yaml
  package_import_url: github://dlitz/esphome-configs-dlitz/waveshare-esp32-s3-zero-btproxy.yaml@wip

safe_mode:
  reboot_timeout: 10min

