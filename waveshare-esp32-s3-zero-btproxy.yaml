# "Buttons" created in home-assistant
button:
  - platform: restart
    id: button_restart
    name: Restart

  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot

  - platform: factory_reset
    id: button_factory_reset
    name: Factory reset
    disabled_by_default: true

binary_sensor:
  - platform: gpio
    name: "BOOT button"
    entity_category: diagnostic
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
      ignore_strapping_warning: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
        - ON for 5s to 10s
        then:
          - button.press: button_safe_mode
      - timing:
        - ON for at least 10s
        then:
          - button.press: button_factory_reset

light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    name: RGB LED
    #entity_category: config
    pin: GPIO21
    rgb_order: RGB
    chipset: WS2812
    num_leds: 1
    restore_mode: ALWAYS_ON
    initial_state:    # XXX This doesn't seem to work for some rason
      state: true
      red: 0%
      green: 100%
      blue: 0%
      brightness: 30%
    effects:
      - strobe:
      - strobe:
          name: Identify
          colors:
            - state: true
              brightness: 30%
              red: 0%
              green: 0%
              blue: 100%
              duration: 250ms
            - state: true
              brightness: 100%
              red: 0%
              green: 0%
              blue: 100%
              duration: 250ms
            - state: true
              brightness: 100%
              red: 0%
              green: 100%
              blue: 100%
              duration: 250ms
            - state: true
              brightness: 30%
              red: 0%
              green: 100%
              blue: 100%
              duration: 250ms

  - platform: status_led
    internal: true
    id: status_led_id
    output: status_led_output

output:
  - platform: template
    id: status_led_output
    type: binary
    write_action:
      - lambda: |-
          static int prev_state = -1;
          //ESP_LOGD("my_status", "prev_state: %d, state: %d, state size: %d", prev_state, (int)state, sizeof(state));
          if (prev_state <= 0 && state > 0) {
            prev_state = state;
            auto call = id(rgb_led).turn_on();
            call.set_brightness(0.30);
            call.set_rgb(1.0, 0.0, 0.0);    // red
            call.set_transition_length(0);
            call.set_publish(false);    // Don't spam the logs
            call.perform();
          } else if (prev_state > 0 && state == 0) {
            prev_state = state;
            auto call = id(rgb_led).make_call();
            call.from_light_color_values(id(rgb_led).remote_values);
            call.set_transition_length(0);
            call.set_publish(false);    // Don't spam the logs
            call.perform();
          }

switch:
  - platform: template
    name: Identify
    entity_category: config
    optimistic: true
    turn_on_action:
      - light.turn_on:
          id: rgb_led
          effect: Identify
      - logger.log:
          format: "identify ON"
          level: INFO
    turn_off_action:
      - light.turn_off:
          id: rgb_led
      - logger.log:
          format: "identify OFF"
          level: INFO

  - platform: template
    id: trig_warning
    name: Trigger warning
    entity_category: diagnostic
    disabled_by_default: true
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(trig_warning).status_set_warning("foo");
    turn_off_action:
      - lambda: |-
          id(trig_warning).status_clear_warning();

  - platform: template
    id: trig_error
    name: Trigger error
    entity_category: diagnostic
    disabled_by_default: true
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(trig_error).status_set_error("foo");
    turn_off_action:
      - lambda: |-
          id(trig_error).status_clear_error();

sensor:
  - platform: uptime
    type: seconds
    name: Uptime

  - platform: internal_temperature
    name: "Internal Temperature"

  #- platform: template
  #  name: App state (uint8)
  #  lambda: |-
  #    return App.get_app_state();
  #  update_interval: 1s

text_sensor:
  - platform: wifi_info
    ssid:
      name: ESP Connected SSID
    bssid:
      name: ESP Connected BSSID
    mac_address:
      name: ESP Mac Wifi Address
    scan_results:
      name: ESP Latest Scan Results
    dns_address:
      name: ESP DNS Address

