substitutions:
  ota_password: !secret ota_fallback_password
  ota_new_password: ""
  ota_update_password: 0
  # tuya_config.json generated by BK7231GUIFlashTool
  tuya_config: {"rl1_lv":"1","bt1_pin":"8","net_trig":"4","netled1_lv":"0","onoff_rst_type":"0","total_bt_pin":"7","nety_led":"0","total_stat":"0","bt1_lv":"0","remote_add_dp":"49","remote_list_dp":"50","module":"CB3S","rl2_pin":"6","series_ctrl":"0","cyc_dpid":"43","bt2_lv":"0","rl1_pin":"24","rl4_lv":"1","onoff_rst_m":"0","rl3_pin":"26","rl3_lv":"1","rand_dpid":"42","rl4_pin":"14","jv":"100","bt3_lv":"0","reset_t":"7","netled1_pin":"22","rl2_lv":"1","net_type":"0","bt4_pin":"11","inch_dp":"44","bt3_pin":"10","ch_cddpid1":"9","init_conf":"38","bt4_lv":"0","zero_select":"0","onoff_type":"2","bt2_pin":"9","ch_cddpid4":"12","ch_cddpid2":"10","ch_cddpid3":"11","total_bt_lv":"0","remote_select":"0","ch_num":"4","ch_dpid3":"3","ch_dpid4":"4","netn_led":"0","ch_dpid1":"1","ch_dpid2":"2","crc":"73"}

dashboard_import:
  package_import_url: github://dlitz/esphome-configs-dlitz/huacaoe-tywb-4ch-white.yaml@wip
  import_full_config: true

packages:
  time: !include common/time.yaml
  factoryreset: !include common/factoryreset.yaml

esphome:
  name: "huacaoe-tywb-4ch-white"
  friendly_name: "Huacaoe 4-Channel Relay"
  comment: "Huacaoe TYWB 4ch-RF 4-channel relay (white, 7-32V power, no external switch port)"
  name_add_mac_suffix: true
  project:
    name: "dlitz.huacaoe-tywb-4ch-white"
    version: "v0.0.0"
  on_boot:
    - lambda: |-
        #define OTA_UPDATE_PASSWORD ${ota_update_password}
        #if !(OTA_UPDATE_PASSWORD == 0 || OTA_UPDATE_PASSWORD == 1)
        # error ota_update_password must be 0 or 1
        #endif
        #ifdef USE_OTA_PASSWORD
        const bool ota_update_password = bool(OTA_UPDATE_PASSWORD);
        const std::string ota_new_password = "${ota_new_password}";
        if (ota_update_password) {
          if (ota_new_password.empty()) {
            ESP_LOGI("ota_update_password", "Setting blank OTA password");
          } else {
            ESP_LOGI("ota_update_password", "Setting new OTA password");
          }
          id(ota_id).set_auth_password(ota_new_password);
          //global_preferences->sync();   // TODO: Is this needed?
        } else {
          ESP_LOGI("ota_update_password", "No new OTA password");
        }
        #elif OTA_UPDATE_PASSWORD == 1
        #  error Cannot set new OTA password - not compiled with OTA support (hint: set a dummy ota_password)
        #else
        #  warning No OTA password set.
        #endif
  platformio_options:
    platform_packages:
      - "library-lwip @ https://github.com/dlitz/lwip.git#mdns-big-txt_bdk"
  includes:
    - "<lwip/apps/mdns_priv.h>" # for struct mdns_service, struct mdns_txtdata
    - "<lwip/init.h>"           # for LWIP_VERSION_STRING

bk72xx:
  board: cb3s
  # Flash size: 2MiB
  # CPU Frequency: 120MHz

  framework:  # LibreTiny
    loglevel: debug
    debug:
      - mdns
      - lwip
    sdk_silent: auto
    options:
      # LT_LOG_HEAP: 1
      LT_AUTO_DOWNLOAD_REBOOT: 1  # this only works when the RXD1 GPIO is configured as a serial port
      MDNS_TXT_RDATA_SIZE: 384    # https://github.com/esphome/esphome/issues/11281
      LWIP_DHCP_DOES_ACD_CHECK: 0 # https://github.com/libretiny-eu/libretiny/issues/316

    # version: "1.9.2"
    # source: "https://github.com/dlitz/libretiny.git#mdns-big-txt"

external_components:
  - source:
      type: git
      url: https://github.com/dlitz/esphome-configs-dlitz.git
      ref: wip
    refresh: always

preferences:
  flash_write_interval: 300s

# Logs are output on the TXD2 pin (Pin 11 - third from the bottom on the right side)
logger:
  level: DEBUG
  baud_rate: 115200

debug:

# Enable Home Assistant API with dynamic key
api:
  encryption:

ota:
  - platform: esphome
    id: ota_id
    password: "${ota_password}"

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: !secret wifi_fallback_ap_password

captive_portal:

network:
  enable_ipv6: true

sensor:
  - platform: internal_temperature
    id: cpu_temperature
    name: "CPU Temperature"

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""

  - platform: template
    name: "MDNS_TXT_RDATA_SIZE"
    accuracy_decimals: 0
    entity_category: diagnostic
    lambda: |-
      #ifdef MDNS_TXT_RDATA_SIZE
      return MDNS_TXT_RDATA_SIZE;
      #else
      return {};
      #endif

  - platform: template
    name: "size of mdns_service.txtdata"
    accuracy_decimals: 0
    entity_category: diagnostic
    lambda: |-
      struct mdns_service srv;
      return sizeof(srv.txtdata);

  - platform: template
    name: "size of mdns_txtdata.rdata"
    accuracy_decimals: 0
    entity_category: diagnostic
    lambda: |-
      struct mdns_txtdata txt;
      return sizeof(txt.rdata);

button:
  - platform: template
    id: button_toggle_all
    name: Toggle All
    on_press:
      - if:
          any:
            - switch.is_on: relay_1
            - switch.is_on: relay_2
            - switch.is_on: relay_3
            - switch.is_on: relay_4
          then:
            - switch.turn_off: relay_1
            - switch.turn_off: relay_2
            - switch.turn_off: relay_3
            - switch.turn_off: relay_4
            - logger.log: "Toggle All button pressed: Turned all off"
          else:
            - switch.turn_on: relay_1
            - switch.turn_on: relay_2
            - switch.turn_on: relay_3
            - switch.turn_on: relay_4
            - logger.log: "Toggle All button pressed: Turned all on"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: Device IP Address
      address_0:
        name: Device IP Address 0
      address_1:
        name: Device IP Address 1
      address_2:
        name: Device IP Address 2
      address_3:
        name: Device IP Address 3
      address_4:
        name: Device IP Address 4
    ssid:
      name: Device Connected SSID
    bssid:
      name: Device Connected BSSID
    mac_address:
      name: Device Mac Wifi Address
    #scan_results:
    #  name: Device Latest Scan Results
    dns_address:
      name: Device DNS Address
    power_save_mode:
      name: Device Wifi Power Save Mode

  - platform: libretiny
    version:
      name: LibreTiny Version

  - platform: template
    name: "LWIP_VERSION_STRING"
    entity_category: diagnostic
    lambda: |-
      static const std::string s = LWIP_VERSION_STRING;
      return s;

light:
  - platform: status_led
    name: "Status LED"
    id: status_led_id
    disabled_by_default: true
    entity_category: diagnostic
    pin:
      number: "${tuya_config.netled1_pin}"
      inverted: ${not(tuya_config.netled1_lv | int)}
    effects:
      - strobe:
          name: Blink
          colors:
            - state: true
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: Fast Blink
          colors:
            - state: true
              duration: 50ms
            - state: false
              duration: 50ms

binary_sensor:
  - platform: status
    name: "Status"
    entity_category: diagnostic

  - platform: gpio
    name: "Button 1"
    id: button_1
    pin:
      number: "${tuya_config.bt1_pin}"
      inverted: ${not(tuya_config.bt1_lv | int)}
      mode:
        input: true
        pullup: true
    filters:
      - settle: 10ms
    on_click:
      then:
        - switch.toggle: relay_1
        - logger.log: "Button 1 pressed: Toggle Relay 1"

  - platform: gpio
    name: "Button 2"
    id: button_2
    pin:
      number: "${tuya_config.bt2_pin}"
      inverted: ${not(tuya_config.bt2_lv | int)}
      mode:
        input: true
        pullup: true
    filters:
      - settle: 10ms
    on_click:
      then:
        - switch.toggle: relay_2
        - logger.log: "Button 2 pressed: Toggle Relay 2"

  - platform: gpio
    name: "Button 3"
    id: button_3
    pin:
      number: "${tuya_config.bt3_pin}"
      inverted: ${not(tuya_config.bt3_lv | int)}
      mode:
        input: true
        pullup: true
    filters:
      - settle: 10ms
    on_click:
      then:
        - switch.toggle: relay_3
        - logger.log: "Button 3 pressed: Toggle Relay 3"

  - platform: gpio
    name: "Button 4"
    id: button_4
    pin:
      number: "${tuya_config.bt4_pin}"
      inverted: ${not(tuya_config.bt4_lv | int)}
      mode:
        input: true
        pullup: true
    filters:
      - settle: 10ms
    on_click:
      then:
        - switch.toggle: relay_4
        - logger.log: "Button 4 pressed: Toggle Relay 4"

  - platform: gpio
    id: toggle_all_button
    pin:
      number: "${tuya_config.total_bt_pin}"
      inverted: ${not(tuya_config.total_bt_lv | int)}
      mode:
        input: true
        pullup: true
    filters:
      - settle: 10ms
    name: "Reset/Toggle All Button"
    on_multi_click:
      # FIXME: status_led effects get overridden when app is in a warning or error state
      - timing:
          - ON for at most 1s
          - OFF for at least 10ms
        then:
          # - logger.log: "Button pressed momentarily: Toggle All"
          - button.press: button_toggle_all
      - timing:
          - ON for at least 2s
        then:
          - light.turn_on:
              id: status_led_id
              effect: Blink
      - timing:
          - ON for 2s to 10s
          - OFF for at least 10ms
        then:
          - logger.log: "Button held for 2-10s: Restart"
          - button.press: button_restart
      - timing:
          - ON for at least 10s
        then:
          - light.turn_on:
              id: status_led_id
              effect: Fast Blink
      - timing:
          - ON for at least 10s
          - OFF for at least 10ms
        then:
          - logger.log: "Button held for over 10s: Factory reset"
          - button.press: button_factory_reset

  - id: !remove button_3    // DEBUG FIXME - this is so that LT_AUTO_DOWNLOAD_REBOOT can work

switch:
  - platform: gpio
    name: "Relay 1"
    id: relay_1
    pin:
      number: "${tuya_config.rl1_pin}"
      inverted: ${not(tuya_config.rl1_lv | int)}

  - platform: gpio
    name: "Relay 2"
    id: relay_2
    pin:
      number: "${tuya_config.rl2_pin}"
      inverted: ${not(tuya_config.rl2_lv | int)}

  - platform: gpio
    id: relay_3
    name: "Relay 3"
    pin:
      number: "${tuya_config.rl3_pin}"
      inverted: ${not(tuya_config.rl3_lv | int)}

  - platform: gpio
    id: relay_4
    name: "Relay 4"
    pin:
      number: "${tuya_config.rl4_pin}"
      inverted: ${not(tuya_config.rl4_lv | int)}

